{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block header %}{% endblock %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="card col-md-5 p-5 shadow-lg border-0" style="border-radius: 1rem;">
        <div class="text-center mb-4">
            <i class="bi bi-activity text-primary" style="font-size: 3rem;"></i>
            <h2 class="fw-bold mt-2">Join GymCore</h2>
            <p class="text-muted">Create an account to manage your membership</p>
        </div>
        
        <form method="post">
            {% csrf_token %}
            {{ form|crispy }}
            <button type="submit" class="btn btn-primary w-100 mt-4 py-2 fw-bold">Sign Up</button>
        </form>
        <div class="mt-3 text-center">
            <p>Already have an account? <a href="{% url 'login' %}">Login here</a></p>
        </div>
    </div>
</div>
{% endblock %}
