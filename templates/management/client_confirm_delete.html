{% extends 'base.html' %}

{% block header %}Delete Client{% endblock %}

{% block content %}
<div class="card border-0 shadow-sm border-danger" style="max-width: 500px;">
    <div class="card-body p-4 text-center">
        <i class="bi bi-exclamation-triangle text-danger" style="font-size: 3rem;"></i>
        <h4 class="mt-3">Are you sure?</h4>
        <p class="text-muted">You are about to delete <strong>{{ object.first_name }} {{ object.last_name }}</strong>. This action cannot be undone.</p>
        
        <form method="post" class="mt-4">
            {% csrf_token %}
            <a href="{% url 'admin_client_list' %}" class="btn btn-light me-2">Cancel</a>
            <button type="submit" class="btn btn-danger">Yes, delete</button>
        </form>
    </div>
</div>
{% endblock %}
